name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  php-quality-gate:
    name: PHP quality gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Validate required files
        run: |
          test -f README.md
          test -f schema.sql
          test -f seed_demo.sql
          test -f .gitignore

      - name: PHP syntax check
        run: php -l index.php && php -l api/index.php && php -l media.php
